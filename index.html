<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Twitter UI Assignment</title>

<style>

/* ============================= */
/* BASE RESET */
/* ============================= */

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body {
    background: #000;
    color: #e7e9ea;
    transition: background 0.4s ease, color 0.4s ease;
    overflow-x: hidden;
}

/* ============================= */
/* ORIGINAL TWITTER-LIKE LAYOUT */
/* ============================= */

.container {
    display: flex;
    max-width: 1300px;
    margin: auto;
    width: 100%;
}

.left-sidebar {
    width: 275px;
    padding: 20px;
    position: sticky;
    top: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
}

.left-sidebar h1 {
    font-size: 28px;
    margin-bottom: 30px;
}

.nav-btn {
    display: flex;
    align-items: center;
    font-size: 20px;
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 30px;
    cursor: pointer;
    transition: 0.2s;
}

.nav-btn:hover {
    background: #16181c;
}

.tweet-btn {
    background: #1d9bf0;
    color: white;
    padding: 15px;
    border-radius: 30px;
    text-align: center;
    font-weight: bold;
    margin-top: 20px;
    cursor: pointer;
}

/* FEED */

.feed {
    flex: 1;
    border-left: 1px solid #2f3336;
    border-right: 1px solid #2f3336;
    min-width: 0; 
}

.feed-header {
    padding: 20px;
    font-size: 22px;
    font-weight: bold;
    border-bottom: 1px solid #2f3336;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(5px);
    position: sticky;
    top: 0;
    z-index: 5;
}

.tweet {
    padding: 20px;
    border-bottom: 1px solid #2f3336;
    display: flex;
    gap: 15px;
}

.avatar {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    object-fit: cover;
    flex-shrink: 0;
}

.tweet-content {
    flex: 1;
}

.username {
    font-weight: bold;
    margin-bottom: 5px;
}

.tweet-text {
    margin-bottom: 10px;
    word-break: break-word;
}

.actions {
    display: flex;
    justify-content: space-between;
    max-width: 300px;
    color: #71767b;
}

/* RIGHT SIDEBAR */

.right-sidebar {
    width: 350px;
    padding: 20px;
}

.trending-box {
    background: #16181c;
    border-radius: 20px;
    padding: 15px;
}

.trend {
    padding: 10px 0;
    border-bottom: 1px solid #2f3336;
    font-size: 14px;
}

/* Responsive Adjustments for Original Layout */
@media (max-width: 1200px) {
    .left-sidebar { width: 88px; align-items: center; }
    .left-sidebar h1, .nav-btn span:not(.icon), .tweet-btn span { display: none; }
    .nav-btn { justify-content: center; width: 50px; height: 50px; padding: 0; border-radius: 50%; }
    .tweet-btn { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; padding: 0; }
    .tweet-btn::before { content: "+"; font-size: 24px; }
}

@media (max-width: 1080px) {
    .right-sidebar { display: none; }
}

@media (max-width: 500px) {
    .left-sidebar {
        position: fixed;
        bottom: 0;
        top: auto;
        height: 60px;
        width: 100%;
        flex-direction: row;
        justify-content: space-around;
        background: #000;
        border-top: 1px solid #2f3336;
        padding: 0;
        z-index: 100;
    }
    .left-sidebar h1, .tweet-btn { display: none; }
    .nav-btn { margin-bottom: 0; }
    .feed { border: none; margin-bottom: 60px; }
}

/* ============================= */
/* SUBTLE TOGGLE */
/* ============================= */

.hidden-toggle {
    position: fixed;
    bottom: 80px; 
    right: 15px;
    font-size: 10px;
    opacity: 0.2;
    cursor: pointer;
    background: rgba(255,255,255,0.1);
    padding: 8px 12px;
    border-radius: 15px;
    z-index: 999;
}

@media (min-width: 501px) {
    .hidden-toggle { bottom: 15px; }
}

.hidden-toggle:hover {
    opacity: 0.6;
}

/* ============================= */
/* SIMPLE MODE (FIXED RESPONSIVE) */
/* ============================= */

.simple-mode {
    --simple-bg: #0f172a;
    --simple-text: #f8fafc;
    --simple-card: #1e293b;
    --simple-hover: #334155;
    --simple-accent: #38bdf8;
    --simple-border: rgba(255, 255, 255, 0.1);
    --simple-shadow: 0 10px 40px rgba(0,0,0,0.4);
    
    background: var(--simple-bg);
    color: var(--simple-text);
}

.simple-mode.light-theme {
    --simple-bg: #f8fafc;
    --simple-text: #0f172a;
    --simple-card: #ffffff;
    --simple-hover: #f1f5f9;
    --simple-accent: #0284c7;
    --simple-border: rgba(0, 0, 0, 0.05);
    --simple-shadow: 0 10px 30px rgba(0,0,0,0.06);
}

.simple-only { display: none; }
.simple-mode .simple-only { display: flex; align-items: center; justify-content: center; cursor: pointer; }

.simple-mode .container {
    max-width: 1000px;
    padding: 15px;
    display: block; /* Switch from flex to block to allow absolute positioning of sidebar on mobile */
}

/* Simple Mode Sidebar (Drawer) */
.simple-mode .left-sidebar {
    position: fixed;
    left: -320px; /* Hidden by default */
    top: 0;
    width: 300px;
    height: 100vh;
    background: var(--simple-card);
    padding: 30px 20px;
    opacity: 1;
    margin: 0;
    box-shadow: var(--simple-shadow);
    transition: left 0.4s cubic-bezier(0.25, 1, 0.5, 1);
    z-index: 1000;
}

.simple-mode.sidebar-open .left-sidebar {
    left: 0;
}

/* Adjust Simple Mode Sidebar for Desktop */
@media (min-width: 1200px) {
    .simple-mode .container { display: flex; }
    .simple-mode .left-sidebar {
        position: sticky;
        left: 0;
        top: 20px;
        height: calc(100vh - 40px);
        width: 300px;
        margin-right: 20px;
        opacity: 0;
        visibility: hidden;
        border-radius: 24px;
    }
    .simple-mode.sidebar-open .left-sidebar {
        opacity: 1;
        visibility: visible;
    }
}

.simple-mode .nav-btn {
    font-size: 22px;
    padding: 14px;
    border-radius: 18px;
    color: var(--simple-text);
}

.simple-mode .theme-toggle {
    display: flex;
    align-items: center;
    gap: 15px;
    background: var(--simple-hover);
    padding: 15px;
    border-radius: 18px;
    cursor: pointer;
    font-weight: bold;
    margin-top: 15px;
}

/* Simple Mode Feed Header */
.simple-mode .feed-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--simple-card);
    padding: 15px 20px;
    border-radius: 20px;
    margin-bottom: 20px;
    font-size: 24px;
    border: 1px solid var(--simple-border);
    position: sticky;
    top: 10px;
    backdrop-filter: blur(10px);
}

.simple-mode .icon-btn {
    width: 48px;
    height: 48px;
    background: var(--simple-hover);
    border-radius: 15px;
    color: var(--simple-accent);
}

/* Simple Mode Tweets */
.simple-mode .tweet {
    background: var(--simple-card);
    border: 1px solid var(--simple-border);
    border-radius: 25px;
    margin-bottom: 20px;
    padding: 20px;
    display: flex;
    flex-direction: row;
    gap: 20px;
}

@media (max-width: 550px) {
    .simple-mode .tweet { flex-direction: column; }
    .simple-mode .avatar { width: 60px; height: 60px; }
}

.simple-mode .avatar {
    width: 70px;
    height: 70px;
    border-radius: 20px;
    border: 3px solid var(--simple-accent);
}

.simple-mode .username { font-size: 22px; color: var(--simple-text); }
.simple-mode .tweet-text { font-size: 18px; line-height: 1.5; color: var(--simple-text); }

.simple-mode .actions {
    max-width: 100%;
    gap: 15px;
    margin-top: 15px;
    flex-wrap: wrap;
    justify-content: flex-start;
}

.simple-mode .actions span {
    width: 60px;
    height: 60px;
    background: var(--simple-hover);
    border-radius: 18px;
    font-size: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Simple Mode Trending Popup */
.simple-mode .right-sidebar {
    position: fixed;
    top: 90px;
    right: 15px;
    width: 320px;
    max-width: calc(100vw - 30px);
    padding: 0;
    opacity: 0;
    visibility: hidden;
    transform: scale(0.9) translateY(-10px);
    transition: 0.3s ease;
    z-index: 1100;
}

.simple-mode.trending-open .right-sidebar {
    opacity: 1;
    visibility: visible;
    transform: scale(1) translateY(0);
}

.simple-mode .trending-box {
    background: var(--simple-card);
    border: 3px solid var(--simple-accent);
    border-radius: 25px;
    padding: 20px;
    box-shadow: var(--simple-shadow);
}

</style>
</head>
<body class="dark-theme">

<div class="hidden-toggle" onclick="toggleSimple()" title="Switch UI Style">Toggle Design Mode</div>

<div class="container">

    <div class="left-sidebar">
        <h1 id="brand-logo">X</h1>
        <div class="nav-btn">
            <span class="icon">🏠</span>
            <span> Home</span>
        </div>
        <div class="nav-btn">
            <span class="icon">🔍</span>
            <span> Explore</span>
        </div>
        <div class="nav-btn">
            <span class="icon">🔔</span>
            <span> Notifications</span>
        </div>
        <div class="nav-btn">
            <span class="icon">👤</span>
            <span> Profile</span>
        </div>
        
        <div class="simple-only display-settings" style="width: 100%;">
            <p style="font-weight: bold; opacity: 0.6; padding-left: 10px; font-size: 12px; margin-bottom: 5px;">DISPLAY SETTINGS</p>
            <div class="theme-toggle" onclick="toggleTheme()">
                <span id="theme-icon">🌙</span>
                <span id="theme-text">Dark Mode</span>
            </div>
        </div>

        <div class="tweet-btn"><span>Post</span></div>
    </div>

    <div class="feed">
        <div class="feed-header">
            <span class="simple-only icon-btn" onclick="toggleSidebar()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </span>
            
            <span class="header-title">Home</span>
            
            <span class="simple-only icon-btn" onclick="toggleTrending()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path></svg>
            </span>
        </div>
        <div id="tweets"></div>
    </div>

    <div class="right-sidebar">
        <div class="trending-box">
            <h3 style="margin-bottom: 10px;">Trends</h3>
            <div class="trend">#CatsOfTheWorld</div>
            <div class="trend">#DogLovers</div>
            <div class="trend">#Wildlife</div>
            <div class="trend">#AnimalPhotography</div>
            <div class="trend">#FrontendAssignment</div>
        </div>
    </div>

</div>

<script>

const tweetData = [
    {
        name: "CatDaily",
        avatar: "https://placekittens.com/200/300",
        text: "This cat refuses to wake up before 10am 🐱 #CatLife"
    },
    {
        name: "DogVibes",
        avatar: "https://placedog.net/100/100",
        text: "Golden retriever discovers snow for the first time ❄️🐶 Best day ever!"
    },
    {
        name: "WildShots",
        avatar: "https://placebear.com/100/100",
        text: "A bear spotted peacefully walking through the forest 🌲 nature is healing."
    },
    {
        name: "DevLife",
        avatar: "https://ui-avatars.com/api/?name=Dev+Life&background=0D8ABC&color=fff",
        text: "Responsive design is just making things smaller until they fit. Change my mind. 💻📱"
    }
];

const container = document.getElementById("tweets");

function render() {
    container.innerHTML = '';
    tweetData.forEach(t => {
        const div = document.createElement("div");
        div.classList.add("tweet");
        div.innerHTML = `
            <img src="${t.avatar}" class="avatar" alt="avatar">
            <div class="tweet-content">
                <div class="username">${t.name}</div>
                <div class="tweet-text">${t.text}</div>
                <div class="actions">
                    <span data-label="Chat">💬</span>
                    <span data-label="Echo">🔁</span>
                    <span data-label="Love">❤️</span>
                    <span data-label="Send">📤</span>
                </div>
            </div>
        `;
        container.appendChild(div);
    });
}

render();

function toggleSimple(){
    const isSimple = document.body.classList.toggle("simple-mode");
    const logo = document.getElementById("brand-logo");
    
    if(isSimple) {
        logo.innerText = "Post It";
        logo.style.color = "#1d9bf0";
    } else {
        logo.innerText = "X";
        logo.style.color = "#e7e9ea";
        document.body.classList.remove("sidebar-open", "trending-open");
    }
}

function toggleTheme() {
    const isLight = document.body.classList.toggle("light-theme");
    document.getElementById("theme-icon").innerText = isLight ? "☀️" : "🌙";
    document.getElementById("theme-text").innerText = isLight ? "Light Mode" : "Dark Mode";
}

function toggleSidebar(){
    document.body.classList.toggle("sidebar-open");
    document.body.classList.remove("trending-open");
}

function toggleTrending(){
    document.body.classList.toggle("trending-open");
    document.body.classList.remove("sidebar-open");
}

// Close sidebar on click outside
document.addEventListener('click', (e) => {
    if (document.body.classList.contains('sidebar-open')) {
        const sidebar = document.querySelector('.left-sidebar');
        const menuBtn = document.querySelector('.icon-btn');
        if (!sidebar.contains(e.target) && !menuBtn.contains(e.target)) {
            toggleSidebar();
        }
    }
    if (document.body.classList.contains('trending-open')) {
        const trending = document.querySelector('.right-sidebar');
        const trendingBtn = document.querySelectorAll('.icon-btn')[1];
        if (!trending.contains(e.target) && !trendingBtn.contains(e.target)) {
            toggleTrending();
        }
    }
});

</script>

</body>
</html>
